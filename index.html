<!DOCTYPE html>
<html>
<head>
    <title>Graded Lab 4</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- = Question 1 = -->
    <h1>Text Comparison Tool</h1>

    <div class="column">
        <h2>Expected output</h2>
        <textarea id="expected" rows="10" cols="50"></textarea>
    </div>

    <div class="column">
        <h2>Actual output</h2>
        <textarea id="actual" rows="10" cols="50"></textarea>
    </div>

    <div id="compare-area">
        <button id="compare-btn">Compare</button>
        <button id="clear-btn">Clear</button>
    </div>

    <ul id="result"></ul>

    <hr>

    <!-- = Question 2 = -->
    <h1>Freedom Fighter Images</h1>

    <div class="pics">
        <img src="mandel1.jpg" alt="Mandela young">
        <img src="mandela2.jpg" alt="Mandela speech">
        <img src="mandela3.jpg" alt="Mandela prison">
        <img src="mandela4.webp" alt="Mandela president">
        <img src="mandela5.jpg" alt="Mandela smile">
        <img src="mandela6.jpg" alt="Mandela elder">
    </div>

    <h3>Favourites</h3>
    <div id="favourites"></div>

    <p id="counter">Remaining: 6</p>

    <h3>Actions</h3>
    <ul id="actions"></ul>

    
    <script src="compare.js"></script>
    <script src="freedom_fighter.js"></script>

</body>
</html>
